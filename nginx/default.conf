# Q-Trade nginx configuration
# Reverse proxy for FastAPI backend + serves React SPA

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    # ── Frontend SPA ────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Serve React SPA — fallback all routes to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.open-meteo.com;" always;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check for load balancers
    location /health.txt {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── Backend API proxy ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS is handled by FastAPI — don't duplicate here
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Proxy WebSocket if needed in future
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

