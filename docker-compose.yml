services:
  # ── Backend: FastAPI + Gunicorn ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist SQLite database outside the container
      - qtrade_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend: React + nginx ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # This URL is baked into the Vite bundle at build time
        VITE_API_BASE: ${VITE_API_BASE:-https://api.yourdomain.com}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Mount SSL certs if using certbot on the host
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  qtrade_data:
    driver: local
